궈<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17분임 오늘의 자리배치</title>
<style>

*{ box-sizing:border-box; margin:0; padding:0; }

:root{
    --bg:#f4f6f8;
    --nav-bg:#fff;
    --nav-shadow:rgba(0,0,0,.1);
    --text:#222;
    --text-sub:#555;
    --text-muted:#666;
    --text-empty:#aaa;
    --h2:#333;
    --seat-fill:#ececec;
    --seat-stroke:#888;
    --table-fill:white;
    --table-stroke:#333;
    --table-text:#000;
    --entrance-fill:#444;
    --label-fill:#000;
    --dday-fill:#888;
    --card-shadow:rgba(0,0,0,.12);
    /* 회의실 테마 */
    --room-floor:#ede8e0;
    --room-wall:#cfc8bf;
    --table-wood:#6d4c41;
    --table-wood-dark:#3e2723;
    --seat-card-bg:#1e3a5f;
    --seat-card-border:#2d5a9e;
    --seat-card-name:#ffffff;
    --seat-card-dday:#93b4db;
    --seat-accent-bar:#1565c0;
    --chair-color:#b8a898;
    --screen-bg:#0d1b2a;
    --screen-text:#00d4ff;
    --wb-bg:#f8f8f8;
    --wb-border:#bbb;
    --wb-text:#555;
    --clock-face:#f5f5f5;
    --clock-border:#aaa;
    --clock-hands:#333;
}

body.dark{
    --bg:#1a1a2e;
    --nav-bg:#16213e;
    --nav-shadow:rgba(0,0,0,.4);
    --text:#e0e0e0;
    --text-sub:#aaa;
    --text-muted:#999;
    --text-empty:#555;
    --h2:#ccc;
    --seat-fill:#2a2a4a;
    --seat-stroke:#555;
    --table-fill:#0f3460;
    --table-stroke:#334;
    --table-text:#ccc;
    --entrance-fill:#aaa;
    --label-fill:#e0e0e0;
    --dday-fill:#888;
    --card-shadow:rgba(0,0,0,.4);
    /* 회의실 테마 (다크) */
    --room-floor:#16182a;
    --room-wall:#0e1020;
    --table-wood:#4e342e;
    --table-wood-dark:#2c1a16;
    --seat-card-bg:#0d2547;
    --seat-card-border:#1a3d7a;
    --seat-card-name:#e0eeff;
    --seat-card-dday:#6b94d6;
    --seat-accent-bar:#1d4ed8;
    --chair-color:#3a3050;
    --screen-bg:#050d18;
    --screen-text:#00b4d8;
    --wb-bg:#1a2a3a;
    --wb-border:#2a4a6a;
    --wb-text:#88b0d8;
    --clock-face:#1a2030;
    --clock-border:#3a4060;
    --clock-hands:#c0d0f0;
}

body{
    background:var(--bg);
    font-family:"Malgun Gothic",sans-serif;
    color:var(--text);
    transition:background .25s,color .25s;
}

/* ── 네비게이션 ── */
nav{
    position:fixed;
    top:0; left:0;
    width:100%;
    height:44px;
    background:var(--nav-bg);
    box-shadow:0 2px 6px var(--nav-shadow);
    display:flex;
    flex-direction:row;
    align-items:center;
    gap:2px;
    padding:0 10px;
    z-index:100;
    transition:background .25s;
}

.nav-btn{
    padding:5px 10px;
    border:none;
    border-radius:6px;
    font-size:12px;
    font-family:inherit;
    cursor:pointer;
    background:transparent;
    color:var(--text-sub);
    transition:background .15s,color .15s;
    white-space:nowrap;
}

.nav-btn.active{
    background:#1976d2;
    color:#fff;
    font-weight:bold;
}

.theme-toggle{
    margin-left:auto;
    padding:5px 10px;
    border:1.5px solid var(--seat-stroke);
    border-radius:6px;
    background:transparent;
    color:var(--text-sub);
    font-size:11px;
    font-family:inherit;
    cursor:pointer;
    white-space:nowrap;
    transition:border-color .2s,color .2s;
}

.theme-toggle:hover{ border-color:#1976d2; color:#1976d2; }

/* ── 페이지 공통 ── */
.page{ display:none; padding-left:0; padding-top:44px; min-height:100vh; }
.page.active{ display:block; }

/* ── 홈 ── */
#page-home{
    padding-left:0;
    padding-top:44px;
}

.date{ color:var(--text-muted); margin-bottom:10px; }

/* ── 종이뽑기 화면 ── */
#lottery-screen{
    text-align:center;
    padding:30px 20px 40px;
}

#lottery-screen h1{ margin-bottom:6px; }

.lottery-wrap{
    display:inline-block;
    margin:18px 0 10px;
    transform-origin:center 85%;
}

@keyframes lotteryShake{
    0%,100%{ transform:rotate(0deg) translateY(0); }
    12%    { transform:rotate(-9deg) translateY(-10px); }
    28%    { transform:rotate(9deg)  translateY(-14px); }
    44%    { transform:rotate(-6deg) translateY(-6px);  }
    60%    { transform:rotate(7deg)  translateY(-11px); }
    76%    { transform:rotate(-4deg) translateY(-4px);  }
    90%    { transform:rotate(3deg)  translateY(-7px);  }
}

.lottery-wrap.shake{
    animation:lotteryShake 1s ease-in-out;
}

#draw-btn{
    display:block;
    margin:16px auto 0;
    padding:14px 48px;
    font-size:20px;
    font-weight:bold;
    font-family:inherit;
    background:#1976d2;
    color:#fff;
    border:none;
    border-radius:50px;
    cursor:pointer;
    box-shadow:0 4px 18px rgba(25,118,210,.4);
    transition:transform .15s,box-shadow .15s,background .15s;
}

#draw-btn:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 7px 22px rgba(25,118,210,.5);
    background:#1565c0;
}

#draw-btn:active:not(:disabled){ transform:translateY(0); }

#draw-btn:disabled{
    opacity:.55;
    cursor:not-allowed;
}

/* ── 자리배치 결과 화면 ── */
#seat-result{
    text-align:center;
    padding-top:10px;
}

#seat-result h1{ margin-bottom:6px; }

/* ── 줌 뷰포트 ── */
.zoom-vp{
    width:100%;
    overflow:hidden;
    touch-action:none;
    position:relative;
    cursor:grab;
}
.zoom-vp:active{ cursor:grabbing; }

svg.seat-map{
    width:100%;
    max-width:1100px;
    height:auto;
    margin-top:20px;
    display:block;
    margin-left:auto;
    margin-right:auto;
    transform-origin:0 0;
    will-change:transform;
}

.seat{ fill:var(--seat-card-bg); stroke:var(--seat-card-border); stroke-width:1.5; }
.label{ font-size:15px; font-weight:bold; fill:var(--seat-card-name); font-family:"Malgun Gothic",sans-serif; }
.dday{ font-size:11px; fill:var(--seat-card-dday); font-family:"Malgun Gothic",sans-serif; }
.table{ fill:var(--table-wood); stroke:var(--table-wood-dark); stroke-width:4; }
.table-text{ fill:rgba(255,255,255,0.14); font-family:"Malgun Gothic",sans-serif; }
.entrance{ font-size:20px; font-weight:bold; fill:var(--entrance-fill); font-family:"Malgun Gothic",sans-serif; }
.room-floor{ fill:var(--room-floor); }
.room-wall{ fill:var(--room-wall); }

/* ── 단일 이미지 페이지 공통 ── */
.img-page{
    padding:60px 24px 40px;
}

.img-page-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:24px;
}

.img-page-header h2{
    font-size:22px;
    color:var(--h2);
}

.single-image-wrap{
    width:100%;
    overflow:hidden;
    touch-action:none;
    position:relative;
    text-align:center;
    cursor:grab;
}
.single-image-wrap:active{ cursor:grabbing; }

.single-image-wrap img{
    max-width:100%;
    max-height:80vh;
    border-radius:12px;
    box-shadow:0 4px 20px var(--card-shadow);
    display:inline-block;
    transform-origin:0 0;
    will-change:transform;
}

.empty-msg{
    color:var(--text-empty);
    font-size:16px;
    text-align:center;
    margin-top:80px;
}

/* ── 라이트박스 ── */
.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.88);
    z-index:200;
    align-items:center;
    justify-content:center;
}

.lightbox.open{ display:flex; }

.lightbox img{
    max-width:94vw;
    max-height:94vh;
    border-radius:8px;
}

.lightbox-close{
    position:fixed;
    top:16px; right:20px;
    color:#fff;
    font-size:32px;
    cursor:pointer;
    background:none;
    border:none;
    line-height:1;
}

</style>
</head>
<body>

<!-- 네비게이션 -->
<nav>
    <button class="nav-btn active" onclick="showPage('home',this)">홈(자리배치)</button>
    <button class="nav-btn"        onclick="showPage('hall',this)">대강당 자리배치도</button>
    <button class="nav-btn"        onclick="showPage('meal',this)">식사순서</button>
    <button class="nav-btn"        onclick="showPage('schedule',this)">과제제출일정</button>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 다크모드</button>
</nav>

<!-- 홈 -->
<div id="page-home" class="page active">

    <!-- ① 첫 화면: 종이뽑기 -->
    <div id="lottery-screen">
        <h1>17분임 오늘의 자리배치</h1>
        <div class="date" id="today"></div>

        <div class="lottery-wrap" id="lotteryWrap">
            <svg viewBox="0 0 320 310" width="280" height="272" style="overflow:visible">
                <!-- 종이들 (먼저 그려서 컵 뒤로 들어가는 효과) -->
                <g id="papers">
                    <!-- 종이1: 분홍 -->
                    <g transform="rotate(-22 102 150)">
                        <rect x="91" y="50" width="22" height="100" rx="4" fill="#FF9AA2"/>
                        <rect x="91" y="50" width="22" height="14" rx="4" fill="#FF6B7A"/>
                        <text x="102" y="100" text-anchor="middle" font-size="19" fill="white" font-weight="bold" font-family="'Malgun Gothic',sans-serif">?</text>
                    </g>
                    <!-- 종이2: 민트 -->
                    <g transform="rotate(-7 131 150)">
                        <rect x="120" y="38" width="22" height="112" rx="4" fill="#B5EAD7"/>
                        <rect x="120" y="38" width="22" height="14" rx="4" fill="#7DC4A7"/>
                        <text x="131" y="90" text-anchor="middle" font-size="19" fill="white" font-weight="bold" font-family="'Malgun Gothic',sans-serif">?</text>
                    </g>
                    <!-- 종이3: 복숭아 (가운데, 가장 높게) -->
                    <g transform="rotate(0 160 150)">
                        <rect x="149" y="32" width="22" height="118" rx="4" fill="#FFDAC1"/>
                        <rect x="149" y="32" width="22" height="14" rx="4" fill="#FFB68C"/>
                        <text x="160" y="84" text-anchor="middle" font-size="19" fill="white" font-weight="bold" font-family="'Malgun Gothic',sans-serif">?</text>
                    </g>
                    <!-- 종이4: 라벤더 -->
                    <g transform="rotate(9 189 150)">
                        <rect x="178" y="38" width="22" height="112" rx="4" fill="#C7CEEA"/>
                        <rect x="178" y="38" width="22" height="14" rx="4" fill="#9AA0D4"/>
                        <text x="189" y="90" text-anchor="middle" font-size="19" fill="white" font-weight="bold" font-family="'Malgun Gothic',sans-serif">?</text>
                    </g>
                    <!-- 종이5: 연한 주황 -->
                    <g transform="rotate(24 216 150)">
                        <rect x="205" y="50" width="22" height="100" rx="4" fill="#FFE5CC"/>
                        <rect x="205" y="50" width="22" height="14" rx="4" fill="#FFB87A"/>
                        <text x="216" y="100" text-anchor="middle" font-size="19" fill="white" font-weight="bold" font-family="'Malgun Gothic',sans-serif">?</text>
                    </g>
                </g>

                <!-- 컵 몸통 (종이 위에 덮어서 아랫부분 숨김) -->
                <path d="M 72 148 L 248 148 L 224 286 Q 160 296 96 286 Z" fill="#D4A574"/>

                <!-- 컵 테두리 -->
                <rect x="68" y="135" width="184" height="20" rx="8" fill="#C8955A"/>
                <!-- 테두리 하이라이트 -->
                <rect x="72" y="137" width="176" height="8" rx="4" fill="#E8C080" opacity="0.5"/>

                <!-- 컵 그림자/패턴 -->
                <path d="M 96 168 L 104 282" stroke="rgba(0,0,0,0.07)" stroke-width="8" stroke-linecap="round"/>

                <!-- 컵 텍스트 -->
                <text x="160" y="228" text-anchor="middle" font-size="15" fill="rgba(255,255,255,0.55)" font-weight="bold" font-family="'Malgun Gothic',sans-serif">제비뽑기</text>
            </svg>
        </div>

        <button id="draw-btn" onclick="drawSeat()">🎋 뽑기!</button>
    </div>

    <!-- ② 결과 화면 -->
    <div id="seat-result" style="display:none">
        <h1>17분임 오늘의 자리배치</h1>
        <div class="date" id="today-result"></div>
        <div class="zoom-vp" id="svgWrap">
            <svg id="seatMap" class="seat-map" viewBox="0 0 1100 1040"></svg>
        </div>
    </div>

</div>

<!-- 대강당 자리배치도 -->
<div id="page-hall" class="page img-page">
    <div class="img-page-header">
        <h2>대강당 자리배치도</h2>
    </div>
    <div class="single-image-wrap">
        <img src="img/hall.jpg" alt="대강당 자리배치도"
             onerror="this.style.display='none';document.getElementById('empty-hall').style.display='block'">
    </div>
    <p class="empty-msg" id="empty-hall" style="display:none">이미지를 준비 중입니다</p>
</div>

<!-- 식사순서 -->
<div id="page-meal" class="page img-page">
    <div class="img-page-header">
        <h2>식사순서</h2>
    </div>
    <div class="single-image-wrap">
        <img src="img/meal.jpg" alt="식사순서"
             onerror="this.style.display='none';document.getElementById('empty-meal').style.display='block'">
    </div>
    <p class="empty-msg" id="empty-meal" style="display:none">이미지를 준비 중입니다</p>
</div>

<!-- 과제제출일정 -->
<div id="page-schedule" class="page img-page">
    <div class="img-page-header">
        <h2>과제제출일정</h2>
    </div>
    <div class="single-image-wrap">
        <img src="img/schedule.png" alt="과제제출일정"
             onerror="this.style.display='none';document.getElementById('empty-schedule').style.display='block'">
    </div>
    <p class="empty-msg" id="empty-schedule" style="display:none">이미지를 준비 중입니다</p>
</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="">
</div>

<script>

/* ── 다크모드 ── */
function applyTheme(dark){
    document.body.classList.toggle('dark', dark);
    document.getElementById('themeBtn').textContent = dark ? '☀️ 라이트모드' : '🌙 다크모드';
}

function toggleTheme(){
    const dark = !document.body.classList.contains('dark');
    localStorage.setItem('theme', dark ? 'dark' : 'light');
    applyTheme(dark);
}

applyTheme(localStorage.getItem('theme') === 'dark');

/* ── 페이지 전환 ── */
function showPage(id, btn){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    btn.classList.add('active');

    if(id === 'home'){
        const lScreen = document.getElementById('lottery-screen');
        const sResult = document.getElementById('seat-result');
        lScreen.style.display    = '';
        lScreen.style.opacity    = '1';
        lScreen.style.transition = '';
        sResult.style.display    = 'none';
        sResult.style.opacity    = '';
        sResult.style.transition = '';
        document.getElementById('draw-btn').disabled = false;
        document.getElementById('lotteryWrap').classList.remove('shake');
    }
}

/* ── 자리배치 데이터 ── */
const BIRTHDAYS = {
    "황민중":[3,4],  "위성군":[7,17], "이현정":[1,13],
    "김도원":[6,1],  "이예지":[5,8],  "정현구":[8,24],
    "정수민":[7,19], "고은지":[11,11],"박상우":[6,5],
    "조혜연":[5,10], "이남기":[10,15],"강예나":[4,21],
    "최서린":[8,15], "최민기":[10,11],"김우빈":[6,19],
    "권회민":[4,11], "나현빈":[5,14]
};

function getDday(name){
    if(!BIRTHDAYS[name]) return "생일을 알려주세요";
    const [month,day] = BIRTHDAYS[name];
    const today = new Date(); today.setHours(0,0,0,0);
    let bday = new Date(today.getFullYear(), month-1, day);
    if(bday <= today) bday = new Date(today.getFullYear()+1, month-1, day);
    const diff = Math.round((bday-today)/(1000*60*60*24));
    return diff===0 ? "🎂 생일" : "D-"+diff+"일";
}

const MEMBERS = [
    "강예나","고은지","권회민","김도원","김우빈",
    "나현빈","박상우","위성군","이남기","이예지",
    "이현정","정수민","정현구","조혜연","최민기",
    "최서린","황민중"
];

function getSeed(){
    const d = new Date();
    return Number(d.getFullYear().toString() +
        String(d.getMonth()+1).padStart(2,"0") +
        String(d.getDate()).padStart(2,"0"));
}

function shuffle(arr,seed){
    const copy=[...arr]; let r=seed;
    for(let i=copy.length-1;i>0;i--){
        r=(r*9301+49297)%233280;
        const j=Math.floor((r/233280)*(i+1));
        [copy[i],copy[j]]=[copy[j],copy[i]];
    }
    return copy;
}

const shuffled = shuffle(MEMBERS, getSeed());
const seats = {
    head:  shuffled[0],
    left:  shuffled.slice(1,9),
    right: shuffled.slice(9,17)
};

document.getElementById("today").innerText = new Date().toLocaleDateString();

/* ── 좌석 그리기 ── */
const svg    = document.getElementById("seatMap");
const SVG_NS = "http://www.w3.org/2000/svg";
function create(tag){ return document.createElementNS(SVG_NS,tag); }

/* ── 화분 그리기 ── */
function drawPlant(cx,cy){
    const pot = create("polygon");
    pot.setAttribute("points",`${cx-14},${cy+24} ${cx+14},${cy+24} ${cx+10},${cy+40} ${cx-10},${cy+40}`);
    pot.setAttribute("fill","#8d5524");
    svg.appendChild(pot);

    const rim = create("ellipse");
    rim.setAttribute("cx",cx); rim.setAttribute("cy",cy+24);
    rim.setAttribute("rx",15); rim.setAttribute("ry",5);
    rim.setAttribute("fill","#a0522d");
    svg.appendChild(rim);

    [[-13,-6,-28,"#2d6a4f"],[13,-6,28,"#40916c"],[0,-18,0,"#52b788"]].forEach(([dx,dy,rot,col])=>{
        const leaf = create("ellipse");
        leaf.setAttribute("cx",cx+dx); leaf.setAttribute("cy",cy+dy);
        leaf.setAttribute("rx",13); leaf.setAttribute("ry",24);
        leaf.setAttribute("fill",col);
        leaf.setAttribute("transform",`rotate(${rot} ${cx+dx} ${cy+dy})`);
        svg.appendChild(leaf);
    });
}

/* ── 시계 그리기 ── */
function drawClock(cx,cy){
    const r=20;
    const face = create("circle");
    face.setAttribute("cx",cx); face.setAttribute("cy",cy);
    face.setAttribute("r",r); face.setAttribute("fill","var(--clock-face)");
    face.setAttribute("stroke","var(--clock-border)"); face.setAttribute("stroke-width","1.5");
    svg.appendChild(face);

    [[0,-1],[1,0],[0,1],[-1,0]].forEach(([dx,dy])=>{
        const dot = create("circle");
        dot.setAttribute("cx",cx+dx*15); dot.setAttribute("cy",cy+dy*15);
        dot.setAttribute("r",1.5); dot.setAttribute("fill","var(--clock-border)");
        svg.appendChild(dot);
    });

    const now = new Date();
    const h = now.getHours()%12 + now.getMinutes()/60;
    const m = now.getMinutes() + now.getSeconds()/60;
    const hA = (h/12)*2*Math.PI - Math.PI/2;
    const mA = (m/60)*2*Math.PI - Math.PI/2;

    [
        [hA,11,2.5],[mA,16,1.5]
    ].forEach(([angle,len,w])=>{
        const hand = create("line");
        hand.setAttribute("x1",cx); hand.setAttribute("y1",cy);
        hand.setAttribute("x2",cx+Math.cos(angle)*len); hand.setAttribute("y2",cy+Math.sin(angle)*len);
        hand.setAttribute("stroke","var(--clock-hands)"); hand.setAttribute("stroke-width",w);
        hand.setAttribute("stroke-linecap","round");
        svg.appendChild(hand);
    });

    const cnt = create("circle");
    cnt.setAttribute("cx",cx); cnt.setAttribute("cy",cy);
    cnt.setAttribute("r",2.5); cnt.setAttribute("fill","var(--clock-hands)");
    svg.appendChild(cnt);

/* ── 좌석 카드 그리기 ── */
function createSeat(name,x,y,side){
    const W=130, H=80, R=10;
    const clipId='clip_'+name.replace(/[^a-z0-9]/gi,'_')+'_'+x;

    const cp = create("clipPath");
    cp.setAttribute("id",clipId);
    const cpR = create("rect");
    cpR.setAttribute("x",x); cpR.setAttribute("y",y);
    cpR.setAttribute("width",W); cpR.setAttribute("height",H);
    cpR.setAttribute("rx",R);
    cp.appendChild(cpR);
    svg.appendChild(cp);

    /* 의자 등받이 */
    if(side==='left'){
        const b=create("rect");
        b.setAttribute("x",x-16); b.setAttribute("y",y+8);
        b.setAttribute("width",13); b.setAttribute("height",H-16);
        b.setAttribute("rx",6); b.setAttribute("fill","var(--chair-color)");
        svg.appendChild(b);
    } else if(side==='right'){
        const b=create("rect");
        b.setAttribute("x",x+W+3); b.setAttribute("y",y+8);
        b.setAttribute("width",13); b.setAttribute("height",H-16);
        b.setAttribute("rx",6); b.setAttribute("fill","var(--chair-color)");
        svg.appendChild(b);
    } else if(side==='top'){
        const b=create("rect");
        b.setAttribute("x",x+18); b.setAttribute("y",y-13);
        b.setAttribute("width",W-36); b.setAttribute("height",13);
        b.setAttribute("rx",6); b.setAttribute("fill","var(--chair-color)");
        svg.appendChild(b);
    }

    /* 카드 그림자 */
    const sh=create("rect");
    sh.setAttribute("x",x+4); sh.setAttribute("y",y+4);
    sh.setAttribute("width",W); sh.setAttribute("height",H);
    sh.setAttribute("rx",R); sh.setAttribute("fill","rgba(0,0,0,0.22)");
    svg.appendChild(sh);

    /* 카드 본체 */
    const card=create("rect");
    card.setAttribute("x",x); card.setAttribute("y",y);
    card.setAttribute("width",W); card.setAttribute("height",H);
    card.setAttribute("rx",R); card.setAttribute("class","seat");
    svg.appendChild(card);

    /* 상단 액센트 바 (클립 적용으로 카드 밖 삐져나옴 방지) */
    const barG=create("g");
    barG.setAttribute("clip-path","url(#"+clipId+")");
    const bar=create("rect");
    bar.setAttribute("x",x); bar.setAttribute("y",y);
    bar.setAttribute("width",W); bar.setAttribute("height",24);
    bar.setAttribute("fill","var(--seat-accent-bar)");
    barG.appendChild(bar);
    svg.appendChild(barG);

    /* 이름 */
    const text=create("text");
    text.setAttribute("x",x+W/2); text.setAttribute("y",y+53);
    text.setAttribute("text-anchor","middle"); text.setAttribute("class","label");
    text.textContent=name;
    svg.appendChild(text);

    /* D-day */
    const dd=create("text");
    dd.setAttribute("x",x+W/2); dd.setAttribute("y",y+70);
    dd.setAttribute("text-anchor","middle"); dd.setAttribute("class","dday");
    dd.textContent=getDday(name);
    svg.appendChild(dd);
}

/* ── 뽑기 버튼 ── */
function drawSeat(){
    const btn  = document.getElementById('draw-btn');
    const wrap = document.getElementById('lotteryWrap');
    btn.disabled = true;
    wrap.classList.add('shake');

    wrap.addEventListener('animationend', function handler(){
        wrap.removeEventListener('animationend', handler);

        const lScreen = document.getElementById('lottery-screen');
        const sResult = document.getElementById('seat-result');

        lScreen.style.transition = 'opacity 0.35s';
        lScreen.style.opacity    = '0';

        setTimeout(() => {
            lScreen.style.display = 'none';

            document.getElementById('today-result').innerText = new Date().toLocaleDateString();
            draw();

            sResult.style.opacity    = '0';
            sResult.style.display    = 'block';
            sResult.style.transition = 'opacity 0.4s';

            requestAnimationFrame(() => requestAnimationFrame(() => {
                sResult.style.opacity = '1';
            }));
        }, 350);
    });
}

/* ── 핀치줌 & 드래그 ── */
function initPinchZoom(vp, content) {
    let scale = 1, tx = 0, ty = 0;
    let t1 = null, t2 = null;

    function apply() {
        content.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    }

    function clamp() {
        const vr = vp.getBoundingClientRect();
        const cw = content.offsetWidth;
        const ch = content.offsetHeight;
        if (scale <= 1) { scale = 1; tx = 0; ty = 0; return; }
        const minTx = vr.width  - cw * scale;
        const minTy = vr.height - ch * scale;
        tx = Math.min(0, Math.max(minTx, tx));
        ty = Math.min(0, Math.max(minTy, ty));
    }

    vp.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const a = e.touches[0], b = e.touches[1];
            const vr = vp.getBoundingClientRect();
            t2 = {
                dist: Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY),
                midX: (a.clientX + b.clientX) / 2 - vr.left,
                midY: (a.clientY + b.clientY) / 2 - vr.top,
                scale, tx, ty
            };
            t1 = null;
        } else if (e.touches.length === 1) {
            t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
            t2 = null;
        }
    }, { passive: false });

    vp.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 2 && t2) {
            const a = e.touches[0], b = e.touches[1];
            const vr = vp.getBoundingClientRect();
            const newDist  = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
            const newScale = Math.min(6, Math.max(1, t2.scale * (newDist / t2.dist)));
            const newMidX  = (a.clientX + b.clientX) / 2 - vr.left;
            const newMidY  = (a.clientY + b.clientY) / 2 - vr.top;
            const ratio = newScale / t2.scale;
            tx = newMidX - (t2.midX - t2.tx) * ratio;
            ty = newMidY - (t2.midY - t2.ty) * ratio;
            scale = newScale;
            clamp();
            apply();
        } else if (e.touches.length === 1 && t1 && scale > 1) {
            tx = t1.tx + e.touches[0].clientX - t1.x;
            ty = t1.ty + e.touches[0].clientY - t1.y;
            clamp();
            apply();
        }
    }, { passive: false });

    vp.addEventListener('touchend', e => {
        if (e.touches.length === 0) {
            t1 = null; t2 = null;
            if (scale < 1.05) { scale = 1; tx = 0; ty = 0; apply(); }
        } else if (e.touches.length === 1) {
            t2 = null;
            t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
        }
    });
}
